<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Productivity Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard">
        <!-- Header Widget -->
        <div class="widget header-widget">
            <div class="greeting">
                <h1 id="greeting-text">Good Morning</h1>
                <p id="user-name">Welcome back!</p>
            </div>
            <div class="clock">
                <div id="time">00:00:00</div>
                <div id="date">Monday, January 1, 2024</div>
            </div>
        </div>

        
        <!-- Task Tracker Widget -->
        <div class="widget task-tracker-widget">
            <h2>Daily Progress</h2>
            <div id="task-tracker-content">
                <div class="current-day-status">
                    <div class="status-circle" id="today-status"></div>
                    <span id="status-text">No tasks yet</span>
                </div>
                <div class="week-progress" id="week-progress">
                    <!-- Week days will be generated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Main Focus Widget -->
        <div class="widget focus-widget">
            <h2>Today's Tasks</h2>
            <div class="focus-input-container">
                <div class="task-input-group">
                    <input type="text" id="new-task" placeholder="Add a new task...">
                    <button id="add-task-btn">Add</button>
                </div>
                <div id="tasks-list">
                    <!-- Tasks will be added here dynamically -->
                </div>
            </div>
        </div>

        <!-- Timer Widget -->
        <div class="widget small-widget timer-widget">
            <h3>⏰ Focus Timer</h3>
            <div class="timer-container">
                <div class="timer-progress-ring">
                    <svg class="timer-svg" width="120" height="120">
                        <circle class="timer-background" cx="60" cy="60" r="54"></circle>
                        <circle class="timer-progress" cx="60" cy="60" r="54"></circle>
                    </svg>
                    <div class="timer-display" id="timer-display">25:00</div>
                </div>
            </div>
            <div class="timer-controls">
                <button id="timer-start">Start</button>
                <button id="timer-reset">Reset</button>
            </div>
        </div>

        <!-- Habit Tracker Widget -->
        <div class="widget small-widget habits-widget">
            <h3>📈 Daily Habits</h3>
            <div id="habits-list">
                <div class="habit-item">
                    <input type="checkbox" id="habit-water">
                    <label for="habit-water">💧 Drink Water</label>
                </div>
                <div class="habit-item">
                    <input type="checkbox" id="habit-exercise">
                    <label for="habit-exercise">🏃 Exercise</label>
                </div>
                <div class="habit-item">
                    <input type="checkbox" id="habit-read">
                    <label for="habit-read">📚 Read</label>
                </div>
            </div>
        </div>

        <!-- Motivation Widget -->
        <div class="widget small-widget motivation-widget">
            <h3>💭 Daily Quote</h3>
            <p id="motivation-text">Loading inspiration...</p>
        </div>

        <!-- Quick Links Widget -->
        <div class="widget small-widget links-widget">
            <h3>🔗 Quick Links</h3>
            <div class="links-grid">
                <a href="#" class="quick-link" data-url="https://github.com">GitHub</a>
                <a href="#" class="quick-link" data-url="https://youtube.com">YouTube</a>
                <a href="#" class="quick-link" data-url="https://gmail.com">Gmail</a>
                <a href="#" class="quick-link" data-url="https://calendar.google.com">Calendar</a>
            </div>
        </div>

        <!-- Quick Notes Widget -->
        <div class="widget small-widget notes-widget">
            <h3>📝 Quick Notes</h3>
            <textarea id="quick-notes" placeholder="Jot down quick thoughts..."></textarea>
        </div>

        <!-- Mood Tracker Widget -->
        <div class="widget small-widget mood-widget">
            <h3>😊 Today's Mood</h3>
            <div class="mood-container">
                <div class="mood-emojis-vertical">
                    <div class="mood-item" data-mood="great">
                        <span class="mood-emoji">😄</span>
                        <span class="mood-count">0</span>
                    </div>
                    <div class="mood-item" data-mood="good">
                        <span class="mood-emoji">🙂</span>
                        <span class="mood-count">0</span>
                    </div>
                    <div class="mood-item" data-mood="okay">
                        <span class="mood-emoji">😐</span>
                        <span class="mood-count">0</span>
                    </div>
                    <div class="mood-item" data-mood="bad">
                        <span class="mood-emoji">😔</span>
                        <span class="mood-count">0</span>
                    </div>
                    <div class="mood-item" data-mood="terrible">
                        <span class="mood-emoji">😢</span>
                        <span class="mood-count">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
